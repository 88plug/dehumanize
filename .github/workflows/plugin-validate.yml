name: plugin-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - run: python3 .ci/validate_plugin.py
      - run: bash tests/smoke.sh
