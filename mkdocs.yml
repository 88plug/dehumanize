site_name: dehumanize
site_description: 'AI agent guardrails for Claude Code and Grok — strips human-framing anti-patterns so the LLM works like AI, not a human in a mech suit.'
site_url: https://88plug.github.io/dehumanize/
repo_url: https://github.com/88plug/dehumanize
repo_name: 88plug/dehumanize
edit_uri: edit/main/docs/
docs_dir: docs
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Anti-Patterns: patterns.md
  - Configuration: config.md
  - Backtesting: backtesting.md
  - Changelog: changelog.md
